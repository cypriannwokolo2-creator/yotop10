name: CD Pipeline

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /home/o4ainnovations/yotop10
            git config --global --add safe.directory /home/o4ainnovations/yotop10
            git pull
            # Use restart instead of down to avoid container removal issues
            docker compose restart
            # If restart fails, try full rebuild
            docker compose up -d --build --pull never
